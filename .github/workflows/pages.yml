name: GitHub Pages

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build WebAssembly module
        run: |
          GOOS=js GOARCH=wasm go build -trimpath -ldflags="-s -w" -o docs/zplgfa.wasm ./cmd/wasm

      - name: Copy wasm_exec.js
        run: |
          if [ -f "$(go env GOROOT)/lib/wasm/wasm_exec.js" ]; then
            cp "$(go env GOROOT)/lib/wasm/wasm_exec.js" docs/wasm_exec.js
          else
            cp "$(go env GOROOT)/misc/wasm/wasm_exec.js" docs/wasm_exec.js
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
